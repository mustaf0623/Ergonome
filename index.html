<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnet — Registre de présence</title>
<meta name="description" content="Registre de présence : pointage, statistiques et rapports par programme.">
<meta name="theme-color" content="#14261D">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Carnet">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-v2.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192-v2.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-v2.png">
<link rel="apple-touch-icon-precomposed" sizes="180x180" href="icons/apple-touch-icon-v2.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    color-scheme: light;
    /* ---- pages (contenu principal) : papier clair ---- */
    --paper:#F2F5EA;
    --paper-2:#E9EEDD;
    --card:#FFFFFF;
    --card-2:#FBFAF1;
    --ink:#1C2A20;
    --ink-dim:#4C5B4D;
    --ink-faint:#84927F;
    --line:rgba(28,42,32,0.13);
    --line-strong:rgba(28,42,32,0.24);
    --shadow:0 16px 38px -20px rgba(20,38,29,0.28);

    /* ---- couverture (barre latérale) : cuir foncé ---- */
    --cover-bg:#122318;
    --cover-surface:#1C3427;
    --cover-surface-2:#25412F;
    --cover-line:rgba(237,241,229,0.12);
    --cover-line-strong:rgba(237,241,229,0.22);
    --cover-ink:#EEF2E6;
    --cover-ink-dim:#AEBCAB;
    --cover-ink-faint:#7C8C7A;

    /* ---- accents (mêmes teintes sur les deux fonds) ---- */
    --emerald:#0F9E6E;
    --emerald-dim:#0B7A55;
    --emerald-tint:rgba(15,158,110,0.14);
    --terracotta:#E15F1E;
    --terracotta-dim:#B54815;
    --terracotta-tint:rgba(225,95,30,0.14);
    --gold:#C4890F;
    --gold-tint:rgba(196,137,15,0.16);

    --radius:14px;
    --radius-sm:8px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  html{ background:var(--paper); }
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Manrope', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{ font-family:'Fraunces', serif; font-weight:600; letter-spacing:-0.01em; }
  .mono{ font-family:'IBM Plex Mono', monospace; }
  ::selection{ background:var(--emerald); color:#fff; }
  a{color:inherit;}
  button{ font-family:inherit; cursor:pointer; }
  input,select{ font-family:inherit; }
  :focus-visible{ outline:2px solid var(--emerald); outline-offset:2px; border-radius:4px; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
  }

  /* ===================== SPLASH ===================== */
  #splash{
    position:fixed; inset:0; z-index:999;
    background:radial-gradient(900px 500px at 20% 0%, #1C3427 0%, var(--cover-bg) 60%);
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    transition:opacity 0.6s ease, visibility 0.6s;
  }
  #splash.hide{ opacity:0; visibility:hidden; pointer-events:none; }
  .splash-mark{
    width:88px;height:88px;border-radius:22px;
    background:linear-gradient(155deg, var(--emerald) 0%, var(--emerald-dim) 100%);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 20px 46px -14px rgba(15,158,110,0.55);
    animation:splashPop 0.7s cubic-bezier(.2,.8,.3,1) both;
  }
  .splash-mark svg{ width:44px;height:44px; }
  @keyframes splashPop{ from{opacity:0; transform:scale(0.7);} to{opacity:1; transform:scale(1);} }
  .splash-title{
    font-family:'Fraunces',serif; font-weight:600; font-size:30px; color:var(--cover-ink);
    margin-top:22px; letter-spacing:-0.01em;
    animation:splashRise 0.7s 0.15s cubic-bezier(.2,.8,.3,1) both;
  }
  .splash-sub{
    font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:0.16em; text-transform:uppercase;
    color:var(--gold); margin-top:10px;
    animation:splashRise 0.7s 0.28s cubic-bezier(.2,.8,.3,1) both;
  }
  @keyframes splashRise{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;} }
  .splash-bar{ width:120px; height:2px; background:var(--cover-line-strong); margin-top:26px; border-radius:2px; overflow:hidden; }
  .splash-bar-fill{ height:100%; width:0%; background:var(--emerald); animation:splashLoad 1.1s 0.3s cubic-bezier(.3,.6,.4,1) forwards; }
  @keyframes splashLoad{ to{ width:100%; } }

  /* ===================== App shell ===================== */
  #app{ display:flex; min-height:100vh; }

  .sidebar{
    width:236px; flex-shrink:0;
    background:var(--cover-bg);
    color:var(--cover-ink);
    border-right:1px solid var(--cover-line);
    display:flex; flex-direction:column;
    padding:26px 18px;
    position:sticky; top:0; height:100vh;
  }
  .brand{ display:flex; align-items:center; gap:10px; padding:0 6px 22px 6px; margin-bottom:18px; border-bottom:1px solid var(--cover-line); }
  .brand-mark{
    width:34px;height:34px;border-radius:9px;
    background:linear-gradient(155deg, var(--emerald) 0%, var(--emerald-dim) 100%);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 16px -6px rgba(15,158,110,0.6);
    flex-shrink:0;
  }
  .brand-mark svg{width:18px;height:18px;}
  .brand-name{ font-size:19px; line-height:1.1; color:var(--cover-ink); }
  .brand-sub{ font-size:10px; color:var(--cover-ink-faint); letter-spacing:0.08em; text-transform:uppercase; margin-top:2px; }

  nav.tabs{ display:flex; flex-direction:column; gap:3px; }
  .tab-btn{
    display:flex; align-items:center; gap:11px;
    background:none; border:none; color:var(--cover-ink-dim);
    padding:11px 12px; border-radius:var(--radius-sm);
    font-size:14.5px; font-weight:600; text-align:left;
    position:relative; transition:background 0.18s ease, color 0.18s ease;
  }
  .tab-btn svg{ width:17px; height:17px; opacity:0.9; flex-shrink:0; }
  .tab-btn:hover{ background:var(--cover-surface); color:var(--cover-ink); }
  .tab-btn.active{ background:var(--cover-surface-2); color:var(--cover-ink); }
  .tab-btn.active::before{
    content:''; position:absolute; left:-18px; top:8px; bottom:8px; width:3px;
    background:var(--emerald); border-radius:0 4px 4px 0;
  }

  .sidebar-footer{ margin-top:auto; padding-top:16px; border-top:1px solid var(--cover-line); }
  .sidebar-org{ font-size:10.5px; color:var(--cover-ink-faint); letter-spacing:0.06em; margin-bottom:12px; }
  .user-chip{ display:flex; align-items:center; gap:10px; padding:8px 6px; border-radius:var(--radius-sm); }
  .avatar{
    width:30px;height:30px;border-radius:50%;
    background:linear-gradient(155deg, var(--gold), var(--terracotta-dim));
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif; font-weight:600; font-size:13px; color:#182115; flex-shrink:0;
  }
  .user-name{ font-size:13.5px; font-weight:700; color:var(--cover-ink); }
  .user-role{ font-size:10.5px; color:var(--cover-ink-faint); }
  .edit-name-btn{ margin-left:auto; background:none; border:none; color:var(--cover-ink-faint); font-size:11px; text-decoration:underline; padding:2px; }

  main{ flex:1; min-width:0; padding:34px 42px 60px; max-width:1180px; background:var(--paper); }
  .view{ animation:viewIn 0.42s cubic-bezier(.2,.7,.3,1) both; }
  @keyframes viewIn{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:none; } }

  .page-head{ display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:26px; flex-wrap:wrap; }
  .eyebrow{ font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--emerald); font-weight:700; margin-bottom:6px; }
  .page-title{ font-size:30px; margin:0; }
  .page-sub{ color:var(--ink-dim); font-size:14px; margin-top:6px; max-width:520px; }

  /* ---------- Buttons ---------- */
  .btn{
    display:inline-flex; align-items:center; gap:8px;
    padding:10px 16px; border-radius:999px; border:1px solid var(--line-strong);
    background:var(--card); color:var(--ink); font-size:13.5px; font-weight:700;
    transition:transform 0.15s ease, background 0.15s ease, border-color .15s ease;
  }
  .btn:hover{ background:var(--card-2); transform:translateY(-1px); }
  .btn:active{ transform:translateY(0); }
  .btn-primary{ background:var(--emerald); border-color:transparent; color:#fff; }
  .btn-primary:hover{ background:var(--emerald-dim); }
  .btn-ghost{ background:transparent; border-color:var(--line-strong); color:var(--ink-dim); }
  .btn-ghost:hover{ background:var(--card-2); color:var(--ink); }
  .btn-sm{ padding:7px 12px; font-size:12.5px; }
  .btn[disabled]{ opacity:0.45; cursor:not-allowed; transform:none !important; }
  .btn svg{ width:14px; height:14px; }

  /* ---------- Cards / ledger ---------- */
  .grid{ display:grid; gap:16px; }
  .grid-4{ grid-template-columns:repeat(4,1fr); }
  .grid-2{ grid-template-columns:1.3fr 1fr; }
  @media (max-width:900px){ .grid-4{grid-template-columns:repeat(2,1fr);} .grid-2{grid-template-columns:1fr;} }

  .card{
    background:var(--card); border:1px solid var(--line);
    border-radius:var(--radius); padding:20px;
    box-shadow:var(--shadow);
  }
  .stat-card .stat-label{ font-size:11.5px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.08em; font-weight:700; }
  .stat-card .stat-value{ font-size:34px; margin-top:8px; font-family:'IBM Plex Mono',monospace; font-weight:600; }
  .stat-card .stat-note{ font-size:12px; color:var(--ink-dim); margin-top:4px; }
  .stat-emerald .stat-value{ color:var(--emerald); }
  .stat-gold .stat-value{ color:var(--gold); }
  .stat-terracotta .stat-value{ color:var(--terracotta); }

  .card-title{ font-size:15px; margin:0 0 3px; }
  .card-sub{ font-size:12px; color:var(--ink-faint); margin-bottom:16px; }

  .ledger{ border-top:1px solid var(--line); }
  .ledger-row{
    display:flex; align-items:center; gap:14px;
    padding:13px 4px; border-bottom:1px dashed var(--line);
    animation:rowIn 0.35s ease both;
  }
  @keyframes rowIn{ from{opacity:0; transform:translateX(-6px);} to{opacity:1; transform:none;} }
  .ledger-row:hover{ background:var(--card-2); }
  .prog-name{ font-weight:700; font-size:13.5px; flex:1; min-width:0; }
  .prog-bar-wrap{ flex:2; height:8px; border-radius:5px; overflow:hidden; background:var(--terracotta-tint); display:flex; }
  .prog-bar-fill{ height:100%; background:var(--emerald); border-radius:5px 0 0 5px; transition:width 0.6s cubic-bezier(.2,.8,.3,1); }
  .prog-pct{ width:52px; text-align:right; font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--emerald); font-weight:700; }

  .legend-dot{ display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }

  /* ---------- Pointage ---------- */
  .pointage-controls{ display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; margin-bottom:22px; }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field label{ font-size:11px; text-transform:uppercase; letter-spacing:0.07em; color:var(--ink-faint); font-weight:700; }
  select, input[type=text], input[type=date], input[type=file]{
    background:var(--card); border:1px solid var(--line-strong); color:var(--ink);
    padding:9px 12px; border-radius:var(--radius-sm); font-size:13.5px; min-width:190px;
  }
  input[type=date]{ min-width:150px; }
  select:focus, input:focus{ border-color:var(--emerald); }

  .member-row{ display:flex; align-items:center; gap:14px; padding:12px 6px; border-bottom:1px dashed var(--line); }
  .member-avatar{
    width:32px;height:32px;border-radius:50%; flex-shrink:0;
    background:var(--card-2); border:1px solid var(--line-strong);
    display:flex;align-items:center;justify-content:center; font-size:12px; font-weight:700;
    font-family:'Fraunces',serif; color:var(--emerald-dim);
  }
  .member-name{ font-weight:700; font-size:13.5px; }
  .member-meta{ font-size:11.5px; color:var(--ink-faint); }
  .member-info{ flex:1; min-width:0; }

  .status-toggle{ display:flex; gap:8px; position:relative; }
  .status-btn{
    padding:7px 14px; border-radius:999px; font-size:12px; font-weight:700;
    border:1px solid var(--line-strong); background:transparent; color:var(--ink-faint);
    position:relative; overflow:visible;
  }
  .status-btn.present.active{ background:var(--emerald-tint); border-color:var(--emerald); color:var(--emerald-dim); }
  .status-btn.absent.active{ background:var(--terracotta-tint); border-color:var(--terracotta); color:var(--terracotta-dim); }

  .stamp{ position:absolute; top:-6px; right:-6px; width:20px; height:20px; animation:stampIn 0.45s cubic-bezier(.3,1.6,.5,1) both; pointer-events:none; }
  @keyframes stampIn{ 0%{ transform:scale(2.4) rotate(-18deg); opacity:0; } 60%{ transform:scale(0.85) rotate(-6deg); opacity:1; } 100%{ transform:scale(1) rotate(-6deg); opacity:1; } }

  .toast{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--cover-bg); border:1px solid var(--emerald); color:var(--cover-ink);
    padding:12px 20px; border-radius:999px; font-size:13.5px; font-weight:600;
    box-shadow:var(--shadow); opacity:0; transition:all 0.35s cubic-bezier(.2,.8,.3,1); z-index:80;
    display:flex; align-items:center; gap:8px;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .install-fab{
    position:fixed; bottom:26px; right:22px; z-index:70;
    display:inline-flex; align-items:center; gap:8px;
    background:var(--emerald); color:#fff; border:none;
    padding:12px 18px; border-radius:999px; font-weight:700; font-size:13.5px;
    box-shadow:0 14px 30px -10px rgba(15,158,110,0.55);
    animation:fabIn 0.5s cubic-bezier(.2,.8,.3,1) both;
    transition:transform 0.15s ease, background 0.15s ease;
  }
  .install-fab:hover{ background:var(--emerald-dim); transform:translateY(-1px); }
  .install-fab svg{ width:16px; height:16px; }
  @keyframes fabIn{ from{ opacity:0; transform:translateY(14px) scale(0.95); } to{ opacity:1; transform:none; } }
  @media (max-width:820px){ .install-fab{ bottom:20px; right:16px; padding:11px 16px; font-size:12.5px; } .install-fab span{ display:none; } .install-fab{ padding:12px; } }

  /* ---------- Onboarding ---------- */
  .onboard-overlay{
    position:fixed; inset:0; background:rgba(18,35,24,0.72); backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center; z-index:100;
    animation:fadeIn 0.4s ease;
  }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  .onboard-card{
    background:var(--card); border:1px solid var(--line-strong); border-radius:20px;
    padding:38px 36px; width:min(400px, 90vw); text-align:center;
    box-shadow:0 30px 70px -20px rgba(18,35,24,0.4);
    animation:cardPop 0.5s cubic-bezier(.2,.8,.3,1) both;
  }
  @keyframes cardPop{ from{ opacity:0; transform:translateY(16px) scale(0.97); } to{ opacity:1; transform:none; } }
  .onboard-mark{ width:52px;height:52px;border-radius:14px; margin:0 auto 18px;
    background:linear-gradient(155deg, var(--emerald), var(--emerald-dim));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 24px -8px rgba(15,158,110,0.6);
  }
  .onboard-mark svg{ width:26px;height:26px; }
  .onboard-card h2{ font-size:23px; margin:0 0 8px; }
  .onboard-card p{ color:var(--ink-dim); font-size:13.5px; line-height:1.5; margin:0 0 22px; }
  .onboard-card input{ width:100%; text-align:center; font-size:15px; margin-bottom:14px; }

  /* ---------- Import ---------- */
  .drop-zone{ border:1.5px dashed var(--line-strong); border-radius:var(--radius); padding:34px 20px; text-align:center; cursor:pointer; transition:border-color 0.2s, background 0.2s; }
  .drop-zone:hover{ border-color:var(--emerald); background:var(--emerald-tint); }
  .mapping-row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; align-items:center; padding:9px 0; border-bottom:1px dashed var(--line); }
  .mapping-row .col-detected{ font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--gold); }

  table.data-table{ width:100%; border-collapse:collapse; font-size:13px; }
  table.data-table th{ text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-faint); padding:8px 10px; border-bottom:1px solid var(--line-strong); }
  table.data-table td{ padding:9px 10px; border-bottom:1px dashed var(--line); }
  table.data-table tr:hover td{ background:var(--card-2); }
  .pill{ display:inline-block; padding:2px 9px; border-radius:999px; font-size:11px; font-weight:700; background:var(--card-2); border:1px solid var(--line-strong); margin:1px 3px 1px 0; }

  .empty-state{ text-align:center; padding:50px 20px; color:var(--ink-faint); }
  .empty-state svg{ width:34px;height:34px; margin-bottom:12px; opacity:0.5; }

  .chip-select{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{ padding:7px 13px; border-radius:999px; border:1px solid var(--line-strong); background:var(--card); font-size:12.5px; font-weight:600; color:var(--ink-dim); }
  .chip.on{ background:var(--emerald-tint); border-color:var(--emerald); color:var(--emerald-dim); }

  @media (max-width:820px){
    #app{ flex-direction:column; }
    .sidebar{ position:sticky; top:0; height:auto; width:100%; flex-direction:row; align-items:center; padding:12px 16px; z-index:50; overflow-x:auto; }
    .brand{ border:none; padding:0; margin:0; margin-right:14px; }
    .brand-sub{ display:none; }
    nav.tabs{ flex-direction:row; }
    .sidebar-footer{ display:none; }
    main{ padding:22px 18px 50px; }
  }
</style>
</head>
<body>
<div id="splash">
  <div class="splash-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M19.8 3.2a2.1 2.1 0 013 3L9.5 19.4l-4 1 1-4L19.8 3.2z" fill="#0F9E6E" stroke="#F2F5EA" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M17 6l3 3" stroke="#F2F5EA" stroke-width="1.3" stroke-linecap="round"/><path d="M2.6 20c1.1-1.9 2.2-1.9 3.3 0s2.2-1.9 3.3-1.9 2.2 1.9 3.3-1.9" fill="none" stroke="#F2F5EA" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <div class="splash-title">Carnet</div>
  <div class="splash-sub">Commission Administrative</div>
  <div class="splash-bar"><div class="splash-bar-fill"></div></div>
</div>
<div id="app"></div>
<div id="toast" class="toast"></div>
<button id="installBtn" class="install-fab" style="display:none;">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M4 16v3a2 2 0 002 2h12a2 2 0 002-2v-3"/></svg>
  <span>Installer l’app</span>
</button>

<script>
/* =========================================================
   CARNET — Registre de présence
   Stockage : IndexedDB (persistant, local à l'appareil)
   ========================================================= */

/* ---------- IndexedDB ---------- */
const DB_NAME = 'CarnetDB';
const DB_VERSION = 1;
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('kv')) db.createObjectStore('kv', { keyPath: 'key' });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGet(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('kv', 'readonly');
    const req = tx.objectStore('kv').get(key);
    req.onsuccess = () => resolve(req.result ? req.result.value : null);
    req.onerror = () => reject(req.error);
  });
}
async function idbSet(key, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('kv', 'readwrite');
    tx.objectStore('kv').put({ key, value });
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

async function pullFromSupabase() {
  const [progRes, memRes, sessRes, ptRes, profRes] = await Promise.all([
    sb.from('programmes').select('*'),
    sb.from('membres').select('*'),
    sb.from('sessions').select('*'),
    sb.from('pointages').select('*'),
    sb.from('profiles').select('*').eq('id', sbUser.id).maybeSingle(),
  ]);
  if (progRes.error) throw progRes.error;
  const programmes = (progRes.data || []).map(r => ({ id: r.id, nom: r.nom }));
  const membres = (memRes.data || []).map(r => ({ id: r.id, nom: r.nom, prenom: r.prenom, sexe: r.sexe, programmeIds: r.programme_ids || [], allProgrammes: !!r.all_programmes, ap: !!r.ap }));
  const sessions = (sessRes.data || []).map(r => ({ id: r.id, programmeId: r.programme_id, date: r.date, label: r.label }));
  const pointages = (ptRes.data || []).map(r => ({ id: r.id, sessionId: r.session_id, membreId: r.membre_id, statut: r.statut }));
  const name = (profRes.data && profRes.data.name) || '';
  return { profile: { name }, programmes, membres, sessions, pointages };
}

async function syncTable(tableName, rows, toRemote, prevMap) {
  const currMap = new Map(rows.map(r => [r.id, JSON.stringify(r)]));
  const toUpsert = [];
  currMap.forEach((json, id) => { if (prevMap.get(id) !== json) toUpsert.push(JSON.parse(json)); });
  const toDelete = [];
  prevMap.forEach((_, id) => { if (!currMap.has(id)) toDelete.push(id); });
  if (toUpsert.length) { const { error } = await sb.from(tableName).upsert(toUpsert.map(toRemote)); if (error) throw error; }
  if (toDelete.length) { const { error } = await sb.from(tableName).delete().in('id', toDelete); if (error) throw error; }
  return currMap;
}

let syncing = false;
async function pushToSupabase() {
  if (!sb || !sbUser || syncing) return;
  syncing = true;
  try {
    snapshotMaps.programmes = await syncTable('programmes', state.data.programmes, p => ({ id: p.id, nom: p.nom }), snapshotMaps.programmes);
    snapshotMaps.membres = await syncTable('membres', state.data.membres, m => ({ id: m.id, nom: m.nom, prenom: m.prenom, sexe: m.sexe, programme_ids: m.programmeIds || [], all_programmes: !!m.allProgrammes, ap: !!m.ap }), snapshotMaps.membres);
    snapshotMaps.sessions = await syncTable('sessions', state.data.sessions, s => ({ id: s.id, programme_id: s.programmeId, date: s.date, label: s.label }), snapshotMaps.sessions);
    snapshotMaps.pointages = await syncTable('pointages', state.data.pointages, p => ({ id: p.id, session_id: p.sessionId, membre_id: p.membreId, statut: p.statut }), snapshotMaps.pointages);
    try { await sb.from('profiles').upsert({ id: sbUser.id, name: state.data.profile.name }); } catch (e) { /* non bloquant */ }
  } catch (e) {
    showToast('Échec de synchronisation — données gardées en local');
  } finally {
    syncing = false;
  }
}

let remoteChangeTimer = null;
function handleRemoteChange() {
  clearTimeout(remoteChangeTimer);
  remoteChangeTimer = setTimeout(async () => {
    try {
      const remote = await pullFromSupabase();
      state.data.programmes = remote.programmes;
      state.data.membres = remote.membres;
      state.data.sessions = remote.sessions;
      state.data.pointages = remote.pointages;
      updateSnapshotsFromCurrent();
      await idbSet('carnet-data', state.data);
      showToast('Données mises à jour depuis un autre appareil');
      render();
    } catch (e) { /* on retentera au prochain changement */ }
  }, 900);
}
function subscribeRealtime() {
  if (!sb || !sbUser) return;
  sb.channel('carnet-sync')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'programmes' }, handleRemoteChange)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'membres' }, handleRemoteChange)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'sessions' }, handleRemoteChange)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'pointages' }, handleRemoteChange)
    .subscribe();
}

/* ---------- computations ---------- */
function sessionYear(dateStr) { return (dateStr || '').slice(0, 4); }
function sessionMonth(dateStr) { return (dateStr || '').slice(0, 7); }
function periodMatches(dateStr, period) {
  if (!period || period === 'toutes') return true;
  if (period.length === 7) return sessionMonth(dateStr) === period;
  return sessionYear(dateStr) === period;
}
function getAvailableMonths(data, progId) {
  const sessions = progId && progId !== 'global' ? data.sessions.filter(s => s.programmeId === progId) : data.sessions;
  const set = new Set(sessions.map(s => sessionMonth(s.date)));
  return Array.from(set).filter(Boolean).sort((a, b) => b.localeCompare(a));
}
const MOIS_FR = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];
function monthLabel(ym) { const [y, m] = ym.split('-'); return MOIS_FR[parseInt(m, 10) - 1] + ' ' + y; }
function getAvailableYears(data) {
  const set = new Set(data.sessions.map(s => sessionYear(s.date)));
  return Array.from(set).filter(Boolean).sort((a, b) => b.localeCompare(a));
}
function memberInProgramme(m, progId) {
  return !!m.allProgrammes || m.programmeIds.includes(progId);
}

// Un membre "Ponctuel (AP)" est intégré définitivement à la base dès qu'il a été
// pointé (présent ou absent) à plus de 6 séances réparties sur au moins 3 programmes.
function checkApPromotion(data, membreId) {
  const m = data.membres.find(x => x.id === membreId);
  if (!m || !m.ap) return false;
  const pts = data.pointages.filter(p => p.membreId === membreId);
  const sessionIds = Array.from(new Set(pts.map(p => p.sessionId)));
  const sessions = sessionIds.map(id => data.sessions.find(s => s.id === id)).filter(Boolean);
  const nbProgrammes = new Set(sessions.map(s => s.programmeId)).size;
  if (sessions.length > 6 && nbProgrammes >= 3) {
    m.ap = false;
    return true;
  }
  return false;
}

function memberStats(data, membreId, yearFilter) {
  yearFilter = yearFilter || 'toutes';
  const m = data.membres.find(x => x.id === membreId);
  const parProgramme = [];
  let totalPresent = 0, totalAbsent = 0;
  data.programmes.forEach(p => {
    if (!m || !memberInProgramme(m, p.id)) return;
    let sessions = data.sessions.filter(s => s.programmeId === p.id);
    if (yearFilter !== 'toutes') sessions = sessions.filter(s => periodMatches(s.date, yearFilter));
    const sessionIds = sessions.map(s => s.id);
    const pts = data.pointages.filter(pt => pt.membreId === membreId && sessionIds.includes(pt.sessionId));
    const present = pts.filter(pt => pt.statut === 'present').length;
    const absent = pts.filter(pt => pt.statut === 'absent').length;
    const total = present + absent;
    totalPresent += present; totalAbsent += absent;
    parProgramme.push({
      programmeId: p.id, nom: p.nom, nbSeancesProgramme: sessions.length,
      present, absent, total, tauxPresence: total ? Math.round((present / total) * 100) : 0,
    });
  });
  const totalAll = totalPresent + totalAbsent;
  return {
    parProgramme,
    overall: { present: totalPresent, absent: totalAbsent, total: totalAll, tauxPresence: totalAll ? Math.round((totalPresent / totalAll) * 100) : 0 },
  };
}

function programStats(data, progId, yearFilter) {
  yearFilter = yearFilter || 'toutes';
  const sessions = data.sessions.filter(s => s.programmeId === progId && periodMatches(s.date, yearFilter));
  const sessionIds = sessions.map(s => s.id);
  const pts = data.pointages.filter(p => sessionIds.includes(p.sessionId));
  const present = pts.filter(p => p.statut === 'present').length;
  const total = pts.length;
  const tauxPresence = total ? Math.round((present / total) * 100) : 0;
  const membresInscrits = data.membres.filter(m => !m.ap && memberInProgramme(m, progId));
  const membresPresentsUneFois = new Set(pts.filter(p => p.statut === 'present').map(p => p.membreId));
  const tauxParticipation = membresInscrits.length ? Math.round((membresPresentsUneFois.size / membresInscrits.length) * 100) : 0;
  return { tauxPresence, tauxAbsence: 100 - tauxPresence, tauxParticipation, nbSessions: sessions.length, nbMembres: membresInscrits.length, present, total };
}
function sessionStats(data, sessionId) {
  const pts = data.pointages.filter(p => p.sessionId === sessionId);
  const present = pts.filter(p => p.statut === 'present').length;
  const total = pts.length;
  return { present, total, tauxPresence: total ? Math.round((present / total) * 100) : 0 };
}
// Statistiques globales, filtrables par programme ('global' = tous) et par année ('toutes' = toutes)
function scopedStats(data, progFilter, yearFilter) {
  yearFilter = yearFilter || 'toutes';
  const membres = (progFilter === 'global' ? data.membres : data.membres.filter(m => memberInProgramme(m, progFilter))).filter(m => !m.ap);
  const nbH = membres.filter(m => m.sexe === 'H').length;
  const nbF = membres.filter(m => m.sexe === 'F').length;
  const total = membres.length;
  let sessions = progFilter === 'global' ? data.sessions : data.sessions.filter(s => s.programmeId === progFilter);
  if (yearFilter !== 'toutes') sessions = sessions.filter(s => periodMatches(s.date, yearFilter));
  const sessionIds = sessions.map(s => s.id);
  const pts = data.pointages.filter(p => sessionIds.includes(p.sessionId));
  const present = pts.filter(p => p.statut === 'present').length;
  const tauxPresence = pts.length ? Math.round((present / pts.length) * 100) : 0;
  return { nbH, nbF, total, tauxPresence, tauxAbsence: 100 - tauxPresence };
}

          ${d.sessions.filter(s => s.programmeId === filter && periodMatches(s.date, yearFilter)).sort((a,b)=>b.date.localeCompare(a.date)).map(s => {

  return `
    <div class="page-head">
      <div>
        <div class="eyebrow">Vue d’ensemble</div>
        <h1 class="page-title">Tableau de bord</h1>
        <p class="page-sub">Comportement des données de présence — filtrable par programme et par année.</p>

      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <div class="field">
          <label>Année</label>

          <select id="dashFilter">${progOptions}</select>
        </div>
      </div>
    </div>
    <div class="grid grid-4" style="margin-bottom:18px;">
      ${statCard('Membres', g.total, filter === 'global' ? 'inscrits au total' : 'inscrits à ce programme', 'stat-emerald')}
      ${statCard('Hommes / Femmes', g.nbH + ' / ' + g.nbF, Math.round((g.nbF/(g.total||1))*100) + '% de femmes', 'stat-gold')}
      ${statCard('Taux de présence', g.tauxPresence + '%', yearFilter === 'toutes' ? 'toutes séances confondues' : 'séances de ' + yearFilter, 'stat-emerald')}
      ${statCard('Taux d’absence', g.tauxAbsence + '%', yearFilter === 'toutes' ? 'toutes séances confondues' : 'séances de ' + yearFilter, 'stat-terracotta')}

        <h3 class="card-title">Répartition Hommes / Femmes</h3>
        <div class="card-sub">${filter === 'global' ? 'Sur l’ensemble des membres' : 'Sur les membres de ce programme'}</div>
        <canvas id="hfChart" height="200"></canvas>
      </div>
    </div>
    ${filter === 'global' ? `<div class="card" style="margin-top:16px;">
      <h3 class="card-title">Taux de participation par programme</h3>

      <canvas id="partChart" height="120"></canvas>
    </div>` : `<div class="card" style="margin-top:16px;">
      <h3 class="card-title">Taux de participation</h3>
      <div class="card-sub">Part des membres inscrits à ce programme ayant été présents au moins une fois${yearFilter !== 'toutes' ? ' en ' + yearFilter : ''}</div>

function statCard(label, value, note, cls) {
  return `<div class="card stat-card ${cls}">
    <div class="stat-label">${label}</div>
    <div class="stat-value">${value}</div>
    <div class="stat-note">${note}</div>
  </div>`;
}
function emptyRow(msg) { return `<div class="ledger-row" style="color:var(--ink-faint);font-size:13px;">${msg}</div>`; }

const centerTextPlugin = {
  id: 'centerText',
  afterDraw(chart) {
    if (chart.config.type !== 'doughnut' || !chart.config._centerText) return;
    const { ctx, chartArea: { left, right, top, bottom } } = chart;
    const cx = (left + right) / 2, cy = (top + bottom) / 2;
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = "700 26px 'Fraunces', serif";
    ctx.fillStyle = '#1C2A20';
    ctx.fillText(chart.config._centerText.value, cx, cy - 6);
    ctx.font = "600 10px 'Manrope', sans-serif";
    ctx.fillStyle = '#84927F';
    ctx.fillText(chart.config._centerText.label, cx, cy + 14);
    ctx.restore();
  }
};

let hfChartInst = null, partChartInst = null;
function attachDashboardEvents() {
  const d = state.data;
  const filterSel = document.getElementById('dashFilter');
  if (filterSel) filterSel.addEventListener('change', e => { state.dashProgFilter = e.target.value; render(); });
  const yearSel = document.getElementById('dashYearFilter');
  if (yearSel) yearSel.addEventListener('change', e => { state.dashYearFilter = e.target.value; render(); });

  const g = scopedStats(d, state.dashProgFilter, state.dashYearFilter);
  const hfCanvas = document.getElementById('hfChart');
  if (hfCanvas) {
    if (hfChartInst) hfChartInst.destroy();
    const ctx = hfCanvas.getContext('2d');
    const goldGrad = ctx.createLinearGradient(0, 0, 0, 220);
    goldGrad.addColorStop(0, '#E0AC2E'); goldGrad.addColorStop(1, '#B87A0C');
    const emeraldGrad = ctx.createLinearGradient(0, 0, 0, 220);
    emeraldGrad.addColorStop(0, '#2CC28E'); emeraldGrad.addColorStop(1, '#0B7A55');
    hfChartInst = new Chart(hfCanvas, {
      type: 'doughnut',
      data: { labels: ['Hommes', 'Femmes'], datasets: [{ data: [g.nbH, g.nbF], backgroundColor: [goldGrad, emeraldGrad], borderColor: '#FFFFFF', borderWidth: 4, hoverOffset: 14, hoverBorderWidth: 4 }] },
      options: {
        cutout: '70%',
        animation: { animateRotate: true, animateScale: true, duration: 1000, easing: 'easeOutQuart' },
        interaction: { intersect: true },
        plugins: {
          legend: { position: 'bottom', labels: { color: '#1C2A20', usePointStyle: true, pointStyle: 'circle', padding: 16, font: { family: 'Manrope', size: 12, weight: 600 } } },
          tooltip: {
            backgroundColor: '#122318', titleColor: '#EEF2E6', bodyColor: '#EEF2E6',
            padding: 10, cornerRadius: 8, displayColors: true, boxPadding: 4,
            callbacks: { label: (ctx) => ' ' + ctx.label + ' : ' + ctx.parsed + (g.total ? ' (' + Math.round(ctx.parsed / g.total * 100) + '%)' : '') }
          }
        }
      },
      plugins: [centerTextPlugin]
    });
    hfChartInst.config._centerText = { value: String(g.total), label: g.total > 1 ? 'membres' : 'membre' };
    hfChartInst.update();
  }
  const partCanvas = document.getElementById('partChart');
  if (partCanvas) {
    if (partChartInst) partChartInst.destroy();
    const ctx2 = partCanvas.getContext('2d');
    const barGrad = ctx2.createLinearGradient(0, 0, 0, 260);
    barGrad.addColorStop(0, '#2CC28E'); barGrad.addColorStop(1, '#0B7A55');
    const barHoverGrad = ctx2.createLinearGradient(0, 0, 0, 260);
    barHoverGrad.addColorStop(0, '#3EDBA3'); barHoverGrad.addColorStop(1, '#0E9E68');
    const labels = d.programmes.map(p => p.nom);
    const values = d.programmes.map(p => programStats(d, p.id, state.dashYearFilter).tauxParticipation);
    partChartInst = new Chart(partCanvas, {
      type: 'bar',
      data: { labels, datasets: [{ label: 'Participation (%)', data: values, backgroundColor: barGrad, hoverBackgroundColor: barHoverGrad, borderRadius: 8, maxBarThickness: 46 }] },
      options: {
        animation: { duration: 900, easing: 'easeOutQuart', delay: (ctx) => ctx.type === 'data' ? ctx.dataIndex * 90 : 0 },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#122318', titleColor: '#EEF2E6', bodyColor: '#EEF2E6',
            padding: 10, cornerRadius: 8,
            callbacks: { label: (ctx) => ' Participation : ' + ctx.parsed.y + '%' }
          }
        },
        scales: {
          y: { beginAtZero: true, max: 100, ticks: { color: '#4C5B4D', callback: (v) => v + '%' }, grid: { color: 'rgba(28,42,32,0.08)' } },
          x: { ticks: { color: '#1C2A20', font: { weight: 600 } }, grid: { display: false } }
        }
      },
      plugins: [{
        id: 'barValueLabels',
        afterDatasetsDraw(chart) {
          const { ctx } = chart;
          chart.getDatasetMeta(0).data.forEach((bar, i) => {
            const val = chart.data.datasets[0].data[i];
            if (val === undefined || val === null) return;
            ctx.save();
            ctx.font = "700 11px 'IBM Plex Mono', monospace";
            ctx.fillStyle = '#0B7A55';
            ctx.textAlign = 'center';
            ctx.fillText(val + '%', bar.x, bar.y - 8);
            ctx.restore();
          });
        }
      }]
    });
  }
}

/* ================= POINTAGE ================= */
function renderPointage() {
  const d = state.data;
  if (!d.programmes.length) return `<div class="page-head"><div><div class="eyebrow">Registre</div><h1 class="page-title">Pointage</h1></div></div>
    <div class="card empty-state">${ICONS.pointage}<h3 style="color:var(--ink);margin:0 0 6px;">Aucun programme</h3><p>Créez d’abord un programme dans l’onglet Membres.</p></div>`;
  if (!state.pointageProgId) state.pointageProgId = d.programmes[0].id;
  const prog = d.programmes.find(p => p.id === state.pointageProgId);
  const pastSessions = d.sessions.filter(s => s.programmeId === state.pointageProgId).sort((a, b) => b.date.localeCompare(a.date));

  let currentPointages = {};
  if (state.pointageSessionId !== 'new') {
    d.pointages.filter(p => p.sessionId === state.pointageSessionId).forEach(p => currentPointages[p.membreId] = p.statut);
  }
  let membres = d.membres.filter(m => memberInProgramme(m, state.pointageProgId));
  
  return `
    <div class="page-head">
      <div>
        <div class="eyebrow">Registre</div>
        <h1 class="page-title">Pointage</h1>
        <p class="page-sub">Marquez la présence ou l’absence pour une séance d’un programme.</p>
      </div>
    </div>
    <div class="pointage-controls">
      <div class="field">
        <label>Programme</label>
        <select id="progSelect">${d.programmes.map(p => `<option value="${p.id}" ${p.id === state.pointageProgId ? 'selected' : ''}>${escapeHtml(p.nom)}</option>`).join('')}</select>
      </div>
      <div class="field">
        <label>Séance</label>
        <select id="sessionSelect">
          <option value="new" ${state.pointageSessionId === 'new' ? 'selected' : ''}>+ Nouvelle séance</option>
          ${sessionOptionsByYear(pastSessions, state.pointageSessionId)}
        </select>
      </div>
      ${state.pointageSessionId === 'new' ? `
      <div class="field"><label>Date</label><input type="date" id="sessionDate" value="${state.pointageDate}"></div>
      <div class="field"><label>Intitulé</label><input type="text" id="sessionLabel" placeholder="Ex. Séance du ${fmtDate(state.pointageDate)}" value="${escapeHtml(state.pointageLabel)}"></div>
      ` : ''}
    </div>
    <div class="card">
      <h3 class="card-title">${escapeHtml(prog.nom)}</h3>
      <div class="card-sub" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
        <span>${membres.length} membre${membres.length > 1 ? 's' : ''} inscrit${membres.length > 1 ? 's' : ''}</span>
        <label style="display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-dim);font-weight:600;cursor:pointer;">
          <input type="checkbox" id="fastModeToggle" ${state.pointageFastMode ? 'checked' : ''} style="width:15px;height:15px;accent-color:var(--emerald);">
          Pointage rapide — cocher les présents, le reste compte absent
        </label>
      </div>
      <div id="memberList">
        ${membres.length ? membres.map(m => memberRow(m, currentPointages[m.id], state.pointageFastMode)).join('') : emptyRow('Aucun membre inscrit à ce programme.')}
      </div>
      ${membres.length ? `<div style="margin-top:20px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;">
        ${state.pointageSessionId !== 'new' ? `<button class="btn btn-ghost" id="deleteSessionBtn" style="color:var(--terracotta);border-color:var(--terracotta-tint);">Supprimer cette séance</button>` : '<span></span>'}
        <button class="btn btn-primary" id="saveSession">${ICONS.mark} Enregistrer le pointage</button>
      </div>` : ''}
    </div>
  `;
}
function sessionOptionsByYear(sessions, selectedId) {
  const byYear = {};
  sessions.forEach(s => { const y = sessionYear(s.date); (byYear[y] = byYear[y] || []).push(s); });
  return Object.keys(byYear).sort((a, b) => b.localeCompare(a)).map(y =>
    `<optgroup label="${y}">${byYear[y].map(s => `<option value="${s.id}" ${s.id === selectedId ? 'selected' : ''}>${fmtDate(s.date)} — ${escapeHtml(s.label)}</option>`).join('')}</optgroup>`
  ).join('');
}
function memberRow(m, statut, fastMode) {
  const statusHtml = fastMode
    ? `<div class="status-toggle">
      <button class="status-btn present ${statut === 'present' ? 'active' : ''}" data-statut="present" style="min-width:110px;">${statut === 'present' ? '✓ Présent' : 'Marquer présent'}</button>
    </div>`
    : `<div class="status-toggle">
      <button class="status-btn present ${statut === 'present' ? 'active' : ''}" data-statut="present">Présent</button>
      <button class="status-btn absent ${statut === 'absent' ? 'active' : ''}" data-statut="absent">Absent</button>
    </div>`;
  return `<div class="member-row" data-membre="${m.id}">
    <div class="member-avatar">${initials(m.nom, m.prenom)}</div>
    <div class="member-info">
      <div class="member-name">${escapeHtml(m.prenom)} ${escapeHtml(m.nom)}${m.ap ? ` <span class="pill" style="background:var(--gold-tint);border-color:var(--gold);color:var(--gold);font-size:10px;">AP</span>` : ''}</div>
      <div class="member-meta">${m.sexe === 'H' ? 'Homme' : 'Femme'}</div>
    </div>
    ${statusHtml}
  </div>`;
}
function attachPointageEvents() {
  const d = state.data;
  const progSel = document.getElementById('progSelect');
  if (progSel) progSel.addEventListener('change', e => { state.pointageProgId = e.target.value; state.pointageSessionId = 'new'; render(); });
  const sessSel = document.getElementById('sessionSelect');
  if (sessSel) sessSel.addEventListener('change', e => { state.pointageSessionId = e.target.value; render(); });
  const fastToggle = document.getElementById('fastModeToggle');
  if (fastToggle) fastToggle.addEventListener('change', e => { state.pointageFastMode = e.target.checked; render(); });
  const dateInput = document.getElementById('sessionDate');
  if (dateInput) dateInput.addEventListener('change', e => state.pointageDate = e.target.value);
  const labelInput = document.getElementById('sessionLabel');
  if (labelInput) labelInput.addEventListener('input', e => state.pointageLabel = e.target.value);
  const deleteSessBtn = document.getElementById('deleteSessionBtn');
  if (deleteSessBtn) deleteSessBtn.addEventListener('click', () => {
    const sess = d.sessions.find(s => s.id === state.pointageSessionId);
    openConfirm(
      'Supprimer cette séance ?',
      'Le pointage enregistré pour « ' + (sess ? sess.label : 'cette séance') + ' » sera définitivement supprimé.',
      () => {
        d.pointages = d.pointages.filter(p => p.sessionId !== state.pointageSessionId);
        d.sessions = d.sessions.filter(s => s.id !== state.pointageSessionId);
        saveData();
        state.pointageSessionId = 'new';
        showToast('Séance supprimée');
        render();
      }
    );
  });

  document.querySelectorAll('.status-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const row = btn.closest('.member-row');
      const wasActive = btn.classList.contains('active');
      const onlyOneBtn = row.querySelectorAll('.status-btn').length === 1;
      row.querySelectorAll('.status-btn').forEach(b => {
        b.classList.remove('active'); b.querySelector('.stamp')?.remove();
        if (onlyOneBtn) b.textContent = 'Marquer présent';
      });
      if (onlyOneBtn && wasActive) return; // re-clic sur "Présent" déjà actif : on le désactive (redevient absent)
      btn.classList.add('active');
      if (btn.dataset.statut === 'present') {
        btn.textContent = '✓ Présent';
        const s = document.createElement('span'); s.className = 'stamp'; s.innerHTML = ICONS.stamp;
        btn.appendChild(s);
      }
    });
  });

  const saveBtn = document.getElementById('saveSession');
  if (saveBtn) saveBtn.addEventListener('click', () => {
    let sessionId = state.pointageSessionId;
    if (sessionId === 'new') {
      const label = (document.getElementById('sessionLabel')?.value || '').trim() || ('Séance du ' + fmtDate(state.pointageDate));
      const sess = { id: uid(), programmeId: state.pointageProgId, date: state.pointageDate, label };
      d.sessions.push(sess);
      sessionId = sess.id;
    }
    const rows = document.querySelectorAll('#memberList .member-row');
    let marked = 0;
    let apTouched = [];
    rows.forEach(row => {
      const membreId = row.dataset.membre;
      const active = row.querySelector('.status-btn.active');
      let statut;
      if (active) statut = active.dataset.statut;
      else if (state.pointageFastMode) statut = 'absent';
      else return;
      d.pointages = d.pointages.filter(p => !(p.sessionId === sessionId && p.membreId === membreId));
      d.pointages.push({ id: uid(), sessionId, membreId, statut });
      marked++;
      const membre = d.membres.find(m => m.id === membreId);
      if (membre && membre.ap) apTouched.push(membre);
    });
    const promoted = apTouched.filter(m => checkApPromotion(d, m.id));
    saveData();
    state.pointageSessionId = sessionId;
    state.pointageLabel = '';
    showToast(marked
      ? 'Pointage enregistré (' + marked + ' membres)' + (promoted.length ? ' — ' + promoted.map(m => m.prenom + ' ' + m.nom).join(', ') + ' intégré(s) définitivement à la base' : '')
      : 'Aucun statut sélectionné');
    render();
  });
}

function guessMapping(headers) {
  const norm = h => h.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const map = {};
  const dict = {
    prenom: ['prenom', 'firstname', 'first name'],
    nom: ['nom', 'lastname', 'last name', 'nom de famille'],
    sexe: ['sexe', 'genre', 'gender'],
  };
  Object.entries(dict).forEach(([key, aliases]) => {
    const found = headers.find(h => aliases.includes(norm(h)));
    if (found) map[key] = found;
  });
  return map;
}

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const wb = XLSX.read(ev.target.result, { type: 'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
      if (!rows.length) { showToast('Fichier vide ou illisible'); return; }
      state.importRows = rows;
      state.importHeaders = Object.keys(rows[0]);
      state.importMapping = guessMapping(state.importHeaders);
      state.importStep = 1;
      render();
    } catch (err) { showToast('Impossible de lire ce fichier'); }
  };
  reader.readAsArrayBuffer(file);
}

function confirmImport() {
  const d = state.data;
  const map = state.importMapping;
  let created = 0;

  state.importRows.forEach(row => {
    const prenom = (map.prenom ? row[map.prenom] : '') || '';
    const nom = (map.nom ? row[map.nom] : '') || '';
    if (!nom && !prenom) return;
    let sexeRaw = (map.sexe ? String(row[map.sexe]) : '').trim().toLowerCase();
    const sexe = ['f', 'femme', 'female', 'w'].includes(sexeRaw) ? 'F' : 'H';
    d.membres.push({ id: uid(), nom: String(nom).trim(), prenom: String(prenom).trim(), sexe, programmeIds: [], allProgrammes: true });
    created++;
  });

  saveData();
  state.importStep = 0; state.importRows = []; state.importHeaders = []; state.importMapping = {};
  showToast(created + ' membre(s) importé(s) — pointables dans tous les programmes');
  render();
}

function buildReportDoc(scope, yearFilter, sessionId) {
  yearFilter = yearFilter || 'toutes';
  const d = state.data;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const emerald = [15, 158, 110], emeraldDk = [11, 122, 85], ink = [28, 42, 32], faint = [132, 146, 127],
        terracotta = [225, 95, 30], gold = [196, 137, 15], track = [232, 232, 224], white = [255, 255, 255];
  const pageW = doc.internal.pageSize.getWidth();
  const margin = 15;
  const contentW = pageW - margin * 2;
  const scopeLabel = scope === 'global' ? 'Tous les programmes' : ((d.programmes.find(p => p.id === scope) || {}).nom || '');

  // ---------- Bandeau d'en-tête ----------
  doc.setFillColor(...emeraldDk);
  doc.rect(0, 0, pageW, 34, 'F');
  doc.setFillColor(...gold);
  doc.rect(0, 34, pageW, 1.4, 'F');
  // Monogramme (logo de l'app)
  try {
    doc.addImage(PDF_LOGO_PNG, 'PNG', margin - 0.5, 9.5, 13, 13);
  } catch (e) {
    doc.setFillColor(...white);
    doc.circle(margin + 6, 16, 6.5, 'F');
    doc.setFont('times', 'bold'); doc.setFontSize(13); doc.setTextColor(...emeraldDk);
    doc.text('C', margin + 6, 18.7, { align: 'center' });
  }
  // Titre
  doc.setFont('times', 'bold'); doc.setFontSize(19); doc.setTextColor(...white);
  doc.text('Carnet', margin + 17, 15);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9.5); doc.setTextColor(230, 240, 235);
  doc.text('Rapport de présence', margin + 17, 21.5);
  // Méta à droite
  doc.setFontSize(9); doc.setTextColor(230, 240, 235);
  const session = sessionId && sessionId !== 'toutes' ? d.sessions.find(s => s.id === sessionId) : null;
  doc.text(scopeLabel, pageW - margin, 13, { align: 'right' });
  if (session) {
    doc.text(session.label, pageW - margin, 18.5, { align: 'right' });
    doc.text(fmtDate(session.date) + '  ·  généré le ' + fmtDate(todayISO()) + ' à ' + nowTime(), pageW - margin, 23.5, { align: 'right' });
  } else {
    const periodLabel = yearFilter === 'toutes' ? '' : (yearFilter.length === 7 ? monthLabel(yearFilter) : 'Année ' + yearFilter) + '  ·  ';
    doc.text(periodLabel + fmtDate(todayISO()) + ' à ' + nowTime(), pageW - margin, 18.5, { align: 'right' });
  }

  let y = 48;

  // ============ RAPPORT D'UNE SÉANCE PRÉCISE ============
  if (session) {
    const membresSession = d.membres.filter(m => memberInProgramme(m, session.programmeId));
    const pointagesSession = d.pointages.filter(p => p.sessionId === session.id);
    const statutOf = (membreId) => { const pt = pointagesSession.find(p => p.membreId === membreId); return pt ? pt.statut : null; };
    const present = pointagesSession.filter(p => p.statut === 'present').length;
    const absent = pointagesSession.filter(p => p.statut === 'absent').length;
    const total = present + absent;
    const taux = total ? Math.round((present / total) * 100) : 0;

    doc.setFont('times', 'bold'); doc.setFontSize(12.5); doc.setTextColor(...ink);
    doc.text('Séance : ' + session.label, margin, y);
    y += 6;

    const cardGap = 5;
    const cardW = (contentW - cardGap * 2) / 3;
    const cardH = 22;
    const cards = [
      { label: 'Présents', value: String(present), color: emerald },
      { label: 'Absents', value: String(absent), color: terracotta },
      { label: 'Taux de présence', value: taux + '%', color: emerald },
    ];
    cards.forEach((c, i) => {
      const cx = margin + i * (cardW + cardGap);
      doc.setFillColor(247, 247, 242);
      doc.roundedRect(cx, y, cardW, cardH, 2.4, 2.4, 'F');
      doc.setFillColor(...c.color);
      doc.roundedRect(cx, y, 2.2, cardH, 1.1, 1.1, 'F');
      doc.setFont('times', 'bold'); doc.setFontSize(15); doc.setTextColor(...c.color);
      doc.text(c.value, cx + 6, y + 12);
      doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(...faint);
      doc.text(c.label, cx + 6, y + 17.5);
    });
    y += cardH + 12;

    doc.setFont('times', 'bold'); doc.setFontSize(12.5); doc.setTextColor(...ink);
    doc.text('Liste de présence', margin, y);
    y += 9;

    const ensureSpace2 = (needed) => { if (y + needed > 280) { doc.addPage(); y = 22; } };
    membresSession.sort((a, b) => (a.nom + a.prenom).localeCompare(b.nom + b.prenom)).forEach((m, i) => {
      ensureSpace2(9);
      const statut = statutOf(m.id);
      if (i % 2 === 0) { doc.setFillColor(247, 247, 242); doc.rect(margin, y - 5.5, contentW, 8, 'F'); }
      doc.setFont('helvetica', 'normal'); doc.setFontSize(10); doc.setTextColor(...ink);
      doc.text(m.prenom + ' ' + m.nom, margin + 3, y);
      const label = statut === 'present' ? 'Présent' : statut === 'absent' ? 'Absent' : 'Non pointé';
      const color = statut === 'present' ? emerald : statut === 'absent' ? terracotta : faint;
      doc.setFont('helvetica', 'bold'); doc.setFontSize(9.5); doc.setTextColor(...color);
      doc.text(label, pageW - margin - 3, y, { align: 'right' });
      y += 8;
    });
    if (!membresSession.length) {
      doc.setFont('helvetica', 'normal'); doc.setFontSize(10); doc.setTextColor(...faint);
      doc.text('Aucun membre inscrit à ce programme.', margin, y);
      y += 8;
    }

    const totalPagesSess = doc.internal.getNumberOfPages();
    for (let i = 1; i <= totalPagesSess; i++) {
      doc.setPage(i);
      const pageH = doc.internal.pageSize.getHeight();
      doc.setDrawColor(...track);
      doc.line(margin, pageH - 22, pageW - margin, pageH - 22);
      doc.setFont('helvetica', 'italic'); doc.setFontSize(9.5); doc.setTextColor(...ink);
      doc.text('Signé par ' + d.profile.name + ' — Commission Administrative', margin, pageH - 15);
      doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(...faint);
      doc.text('Généré automatiquement par Carnet le ' + fmtDate(todayISO()) + ' à ' + nowTime(), margin, pageH - 10.5);
      doc.text('Page ' + i + ' / ' + totalPagesSess, pageW - margin, pageH - 10.5, { align: 'right' });
    }

    const filenameSess = 'pointage-' + scopeLabel.toLowerCase().replace(/\s+/g, '-') + '-' + session.date + '.pdf';
    return { doc, filename: filenameSess };
  }

  const progsInScope = scope === 'global' ? d.programmes : d.programmes.filter(p => p.id === scope);
  const membresInScope = (scope === 'global' ? d.membres : d.membres.filter(m => memberInProgramme(m, scope))).filter(m => !m.ap);
  const nbH = membresInScope.filter(m => m.sexe === 'H').length;
  const nbF = membresInScope.filter(m => m.sexe === 'F').length;
  const globalPts = (scope === 'global' ? d.sessions : d.sessions.filter(s => s.programmeId === scope))
    .filter(s => periodMatches(s.date, yearFilter))
    .map(s => s.id);
  const ptsInScope = d.pointages.filter(p => globalPts.includes(p.sessionId));
  const presentCount = ptsInScope.filter(p => p.statut === 'present').length;
  const tauxGlobal = ptsInScope.length ? Math.round((presentCount / ptsInScope.length) * 100) : 0;

  // ---------- Cartes "Effectifs" ----------
  doc.setFont('times', 'bold'); doc.setFontSize(12.5); doc.setTextColor(...ink);
  doc.text('Effectifs', margin, y);
  y += 6;

  const cardGap = 5;
  const cardW = (contentW - cardGap * 2) / 3;
  const cardH = 22;
  const cards = [
    { label: 'Membres inscrits', value: String(membresInScope.length), color: gold },
    { label: 'Hommes / Femmes', value: nbH + ' / ' + nbF, color: emerald },
    { label: 'Taux de présence', value: tauxGlobal + '%', color: emerald },
  ];
  cards.forEach((c, i) => {
    const cx = margin + i * (cardW + cardGap);
    doc.setFillColor(247, 247, 242);
    doc.roundedRect(cx, y, cardW, cardH, 2.4, 2.4, 'F');
    doc.setFillColor(...c.color);
    doc.roundedRect(cx, y, 2.2, cardH, 1.1, 1.1, 'F');
    doc.setFont('times', 'bold'); doc.setFontSize(15); doc.setTextColor(...c.color);
    doc.text(c.value, cx + 6, y + 12);
    doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(...faint);
    doc.text(c.label, cx + 6, y + 17.5);
  });
  y += cardH + 12;

  // ---------- Statistiques par programme ----------
  doc.setFont('times', 'bold'); doc.setFontSize(12.5); doc.setTextColor(...ink);
  doc.text('Statistiques par programme', margin, y);
  y += 3;
  doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5); doc.setTextColor(...faint);
  doc.setFillColor(...emerald); doc.circle(margin + 1, y + 5.3, 1.1, 'F');
  doc.text('Présence', margin + 4, y + 6.2);
  doc.setFillColor(...terracotta); doc.circle(margin + 26, y + 5.3, 1.1, 'F');
  doc.text('Absence', margin + 29, y + 6.2);
  y += 12;

  const ensureSpace = (needed) => { if (y + needed > 280) { doc.addPage(); y = 22; } };

  progsInScope.forEach(p => {
    const s = programStats(d, p.id, yearFilter);
    ensureSpace(22);
    doc.setFont('helvetica', 'bold'); doc.setFontSize(10.5); doc.setTextColor(...ink);
    doc.text(p.nom, margin, y);
    doc.setFont('helvetica', 'bold'); doc.setFontSize(10.5); doc.setTextColor(...emeraldDk);
    doc.text(s.tauxPresence + '%', pageW - margin, y, { align: 'right' });
    y += 3.5;

    const barW = contentW;
    const barH = 3.4;
    doc.setFillColor(...track);
    doc.roundedRect(margin, y, barW, barH, 1.7, 1.7, 'F');
    if (s.tauxPresence > 0) {
      doc.setFillColor(...emerald);
      doc.roundedRect(margin, y, Math.max(barW * s.tauxPresence / 100, barH), barH, 1.7, 1.7, 'F');
    }
    y += barH + 4.5;

    doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5); doc.setTextColor(...faint);
    doc.text(s.nbMembres + ' membre' + (s.nbMembres > 1 ? 's' : '') + '   ·   ' + s.nbSessions + ' séance' + (s.nbSessions > 1 ? 's' : '') + '   ·   participation ' + s.tauxParticipation + '%', margin, y);
    y += 9;
  });

  if (!progsInScope.length) {
    doc.setFont('helvetica', 'normal'); doc.setFontSize(10); doc.setTextColor(...faint);
    doc.text('Aucun programme dans cette portée.', margin, y);
    y += 10;
  }

  // ---------- Pied de page : signature + numérotation ----------
  const totalPages = doc.internal.getNumberOfPages();
  for (let i = 1; i <= totalPages; i++) {
    doc.setPage(i);
    const pageH = doc.internal.pageSize.getHeight();
    doc.setDrawColor(...track);
    doc.line(margin, pageH - 22, pageW - margin, pageH - 22);
    doc.setFont('helvetica', 'italic'); doc.setFontSize(9.5); doc.setTextColor(...ink);
    doc.text('Signé par ' + d.profile.name + ' — Commission Administrative', margin, pageH - 15);
    doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(...faint);
    doc.text('Généré automatiquement par Carnet le ' + fmtDate(todayISO()) + ' à ' + nowTime(), margin, pageH - 10.5);
    doc.text('Page ' + i + ' / ' + totalPages, pageW - margin, pageH - 10.5, { align: 'right' });
  }

  const filename = 'rapport-' + (scope === 'global' ? 'global' : scopeLabel.toLowerCase().replace(/\s+/g, '-')) + (yearFilter !== 'toutes' ? '-' + yearFilter : '') + '-' + todayISO() + '.pdf';
  return { doc, filename };
}

function downloadPdf(scope, yearFilter, sessionId) {
  const { doc, filename } = buildReportDoc(scope, yearFilter, sessionId);
  doc.save(filename);
  showToast('Rapport PDF téléchargé');
}

/* ================= INSTALLATION PWA ================= */
let deferredInstallPrompt = null;
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

function showInstallBtn() {
  if (isStandalone) return;
  const btn = document.getElementById('installBtn');
  if (btn) btn.style.display = 'inline-flex';
}
function hideInstallBtn() {
  const btn = document.getElementById('installBtn');
  if (btn) btn.style.display = 'none';
}

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  showInstallBtn();
});
window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  hideInstallBtn();
  showToast('Application installée ✓');
});

function renderIOSInstallModal() {
  return `
  <div class="onboard-overlay" id="iosInstallOverlay">
    <div class="onboard-card">
      <div class="onboard-mark">${ICONS.mark}</div>
      <h2>Installer Carnet</h2>
      <p>Appuyez sur l’icône <strong>Partager</strong> en bas de Safari (le carré avec une flèche), puis sur <strong>« Sur l’écran d’accueil »</strong>.</p>
      <button class="btn btn-primary" id="iosInstallCloseBtn" style="width:100%;justify-content:center;">Compris</button>
    </div>
  </div>`;
}
function attachIOSInstallModal() {
  document.getElementById('iosInstallCloseBtn').addEventListener('click', () => {
    document.getElementById('iosInstallOverlay').remove();
  });
}

document.getElementById('installBtn').addEventListener('click', async () => {
  if (deferredInstallPrompt) {
    deferredInstallPrompt.prompt();
    const choice = await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    hideInstallBtn();
    if (choice.outcome !== 'accepted') showInstallBtn();
  } else if (isIOS) {
    document.getElementById('app').insertAdjacentHTML('afterend', renderIOSInstallModal());
    attachIOSInstallModal();
  }
});

if (isIOS && !isStandalone) showInstallBtn();

/* ================= SERVICE WORKER ================= */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const registration = await navigator.serviceWorker.register('./sw.js');
      registration.addEventListener('updatefound', () => {
        const newWorker = registration.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            showToast('Nouvelle version disponible — rechargez la page');
          }
        });
      });
    } catch (err) { /* pas grave hors ligne au premier chargement */ }
  });
}

/* ================= AUTH (Supabase) ================= */
let authMode = 'login'; // 'login' | 'signup'
function renderAuthScreen(errorMsg) {
  document.getElementById('app').innerHTML = `
  <div class="onboard-overlay" style="position:fixed;">
    <div class="onboard-card">
      <div class="onboard-mark">${ICONS.mark}</div>
      <h2>${authMode === 'login' ? 'Se connecter' : 'Créer un compte'}</h2>
      <p>Connectez-vous pour retrouver les mêmes données sur tous vos appareils.</p>
      ${errorMsg ? `<p style="color:var(--terracotta);font-size:12.5px;margin-top:-10px;">${escapeHtml(errorMsg)}</p>` : ''}
      <input type="text" id="authEmail" placeholder="Adresse e-mail" autocomplete="username" style="margin-bottom:10px;" />
      <input type="password" id="authPassword" placeholder="Mot de passe" autocomplete="current-password" />
      <button class="btn btn-primary" id="authSubmitBtn" style="width:100%;justify-content:center;margin-top:14px;margin-bottom:10px;">${authMode === 'login' ? 'Se connecter' : 'Créer le compte'}</button>
      <button class="btn btn-ghost" id="authToggleBtn" style="width:100%;justify-content:center;">${authMode === 'login' ? 'Pas encore de compte ? En créer un' : 'Déjà un compte ? Se connecter'}</button>
    </div>
  </div>`;
  document.getElementById('authSubmitBtn').addEventListener('click', submitAuth);
  document.getElementById('authPassword').addEventListener('keydown', e => { if (e.key === 'Enter') submitAuth(); });
  document.getElementById('authToggleBtn').addEventListener('click', () => { authMode = authMode === 'login' ? 'signup' : 'login'; renderAuthScreen(); });
}
async function submitAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  if (!email || !password) { renderAuthScreen('Merci de renseigner un e-mail et un mot de passe.'); return; }
  const btn = document.getElementById('authSubmitBtn');
  btn.disabled = true; btn.textContent = 'Un instant…';
  try {
    const fn = authMode === 'login' ? sb.auth.signInWithPassword : sb.auth.signUp;
    const { data, error } = await fn.call(sb.auth, { email, password });
    if (error) { renderAuthScreen(error.message); return; }
    if (authMode === 'signup' && !data.session) {
      renderAuthScreen('Compte créé — vérifiez votre e-mail pour confirmer, puis connectez-vous.');
      authMode = 'login';
      return;
    }
    sbUser = data.user;
    await startApp();
  } catch (e) {
    renderAuthScreen('Connexion impossible. Vérifiez votre réseau et réessayez.');
  } finally {
    btn.disabled = false; btn.textContent = authMode === 'login' ? 'Se connecter' : 'Créer le compte';
  }
}
async function signOutSupabase() {
  if (!sb) return;
  await sb.auth.signOut();
  sbUser = null;
  location.reload();
}

/* ================= INIT ================= */
async function startApp() {
  let data;
  if (sb && sbUser) {
    try {
      data = await pullFromSupabase();
      if (!data.profile.name) { const local = await loadData(); if (local && local.profile.name) data.profile.name = local.profile.name; }
      await idbSet('carnet-data', data);
    } catch (e) {
      data = await loadData() || emptyData();
      showToast('Connexion au serveur impossible — mode hors-ligne local');
    }
  } else {
    data = await loadData() || emptyData();
  }
  state.data = data;
  if (sb && sbUser) { updateSnapshotsFromCurrent(); subscribeRealtime(); }
  render();
}

(async function init() {
  const minSplash = new Promise(res => setTimeout(res, 1250));
  if (supabaseConfigured() && window.supabase) {
    try {
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const { data: { session } } = await sb.auth.getSession();
      sbUser = session ? session.user : null;
      sb.auth.onAuthStateChange((event, session) => { sbUser = session ? session.user : null; });
    } catch (e) { sb = null; }
  }
  await minSplash;
  document.getElementById('splash').classList.add('hide');
  if (sb && !sbUser) { renderAuthScreen(); return; }
  await startApp();
})();
</script>
